name: Bot Despertador 24/7

# 1. ¿CUÁNDO SE EJECUTA?
on:
  schedule:
    - cron: '*/15 * * * *' # El reloj universal: significa "cada 15 minutos"
  workflow_dispatch: # Nos permite probar el botón manualmente

# 2. ¿QUÉ TIENE QUE HACER?
jobs:
  mantener_despierto:
    runs-on: ubuntu-latest # Pide prestada una computadora con Linux
    
    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v3
        
      - name: 🐍 Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 Instalar herramientas
        run: pip install requests
        
      - name: 🚀 Ejecutar el bot despertador
        run: python bot_despertador.py